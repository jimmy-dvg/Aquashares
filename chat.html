<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquashares - Chat</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/index.html">Aquashares</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/index.html">Feed</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/post-create.html">Create Post</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link active" aria-current="page" href="/chat.html">Chat</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/profile.html">Profile</a></li>
            <li class="nav-item d-none" data-nav-admin><a class="nav-link" href="/admin.html">Admin</a></li>
            <li class="nav-item" data-nav-guest><a class="nav-link" href="/login.html">Login</a></li>
            <li class="nav-item" data-nav-guest><a class="nav-link" href="/register.html">Register</a></li>
            <li class="nav-item dropdown d-none" data-nav-auth data-notifications-dropdown>
              <button
                type="button"
                class="btn btn-link nav-link p-0 position-relative"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-label="Notifications"
              >
                <i class="bi bi-bell-fill" aria-hidden="true"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" data-notifications-badge>0</span>
              </button>
              <div class="dropdown-menu dropdown-menu-end p-0 aqua-notifications-menu">
                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                  <strong class="small">Notifications</strong>
                  <button type="button" class="btn btn-link btn-sm p-0" data-notifications-mark-all>Mark all read</button>
                </div>
                <div class="list-group list-group-flush" data-notifications-list></div>
                <div class="px-3 py-2 text-secondary small" data-notifications-empty>No notifications yet.</div>
              </div>
            </li>
            <li class="nav-item d-none" data-nav-auth><span class="nav-link" data-nav-status></span></li>
            <li class="nav-item d-none" data-nav-auth><button type="button" class="btn btn-link nav-link p-0" data-nav-logout>Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-content" data-chat-page>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Messages</h1>
      </div>

      <div class="text-secondary mb-3" data-chat-loading>Loading chat...</div>
      <div class="alert alert-danger d-none" role="alert" data-chat-feedback></div>

      <section class="chat-shell">
        <aside class="chat-sidebar">
          <div>
            <label for="chat-user-search" class="form-label small mb-1">Start new chat</label>
            <input
              id="chat-user-search"
              type="search"
              class="form-control form-control-sm"
              placeholder="Search by username..."
              data-chat-user-search
            />
          </div>

          <div class="list-group" data-chat-user-results></div>

          <div class="border-top pt-2">
            <h2 class="h6 mb-2">Conversations</h2>
            <div class="list-group" data-chat-conversation-list></div>
          </div>
        </aside>

        <section class="chat-main">
          <header class="chat-main-header">
            <h2 class="h5 mb-0" data-chat-header-title>Select a chat</h2>
            <p class="small text-secondary mb-0" data-chat-header-meta>Search users to start messaging.</p>
          </header>

          <div class="chat-main-messages" data-chat-messages></div>

          <div class="chat-main-composer">
            <form class="d-flex gap-2" data-chat-composer>
              <textarea
                id="chat-message-input"
                name="chatMessage"
                class="form-control"
                rows="2"
                maxlength="4000"
                placeholder="Type a message..."
                data-chat-message-input
                disabled
              ></textarea>
              <button type="submit" class="btn btn-primary" data-chat-message-submit disabled>
                <i class="bi bi-send" aria-hidden="true"></i>
              </button>
            </form>
          </div>
        </section>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
