<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquashares - Подарявам</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/index.html">Aquashares</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav align-items-lg-center gap-lg-1 mb-2 mb-lg-0 aqua-nav-pages">
            <li class="nav-item dropdown aqua-nav-categories" data-nav-forum>
              <button
                type="button"
                class="nav-link btn btn-link dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                data-nav-forum-toggle
              >
                Categories
              </button>
              <ul class="dropdown-menu" data-nav-forum-menu>
                <li><a class="dropdown-item" href="/index.html">All Categories</a></li>
              </ul>
            </li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/post-create.html">Create Post</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/chat.html">Chat</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/profile.html">Profile</a></li>
            <li class="nav-item d-none" data-nav-admin><a class="nav-link" href="/admin.html">Admin</a></li>
          </ul>

          <form class="aqua-nav-search my-2 my-lg-0 mx-lg-3" role="search" data-nav-search-form>
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-search" aria-hidden="true"></i></span>
              <input
                type="search"
                class="form-control"
                name="q"
                placeholder="Search posts..."
                aria-label="Search posts"
                data-nav-search-input
              />
            </div>
          </form>

          <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 ms-lg-auto aqua-nav-account">
            <div class="d-flex align-items-center gap-2 d-none" data-nav-auth>
              <div class="dropdown" data-notifications-dropdown>
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm position-relative aqua-nav-icon-btn"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  aria-label="Notifications"
                >
                  <i class="bi bi-bell-fill" aria-hidden="true"></i>
                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" data-notifications-badge>0</span>
                </button>
                <div class="dropdown-menu dropdown-menu-end p-0 aqua-notifications-menu">
                  <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                    <strong class="small">Notifications</strong>
                    <button type="button" class="btn btn-link btn-sm p-0" data-notifications-mark-all>Mark all read</button>
                  </div>
                  <div class="list-group list-group-flush" data-notifications-list></div>
                  <div class="px-3 py-2 text-secondary small" data-notifications-empty>No notifications yet.</div>
                </div>
              </div>

              <div class="dropdown">
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm dropdown-toggle aqua-nav-user-trigger"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  data-nav-user-button
                >
                  <i class="bi bi-person-circle" aria-hidden="true"></i>
                  <span data-nav-status>User</span>
                  <span class="badge text-bg-warning d-none" data-nav-user-role>Admin</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" href="/profile.html">Profile</a></li>
                  <li class="d-none" data-nav-admin><a class="dropdown-item" href="/admin.html">Admin Panel</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li><button type="button" class="dropdown-item text-danger" data-nav-logout>Logout</button></li>
                </ul>
              </div>
            </div>

            <div class="d-flex align-items-center gap-2" data-nav-guest>
              <a class="btn btn-outline-secondary btn-sm" href="/login.html">Login</a>
              <a class="btn btn-primary btn-sm" href="/register.html">Register</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container page-content" data-feed-section="giveaway">
      <div class="aqua-feed-filter-bar mb-3">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <h1 class="h3 mb-0">Подарявам</h1>
          <div class="aqua-feed-filter-actions">
            <button
              type="button"
              class="btn btn-outline-secondary btn-sm"
              data-bs-toggle="collapse"
              data-bs-target="#feed-advanced-filters"
              aria-expanded="false"
              aria-controls="feed-advanced-filters"
            >
              <i class="bi bi-sliders" aria-hidden="true"></i>
              Още филтри
              <span class="badge text-bg-secondary ms-1 d-none" data-feed-filter-count>0</span>
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm d-none" data-feed-clear-filter>
              <i class="bi bi-x-circle" aria-hidden="true"></i>
              Изчисти
            </button>
          </div>
        </div>

        <div class="aqua-feed-filter-grid aqua-feed-filter-grid-primary">
        <div class="aqua-feed-filter-field aqua-feed-filter-field-lg">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-search me-1" aria-hidden="true"></i>Търсене</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search" aria-hidden="true"></i></span>
            <input
              type="search"
              class="form-control"
              name="feed-search"
              placeholder="По заглавие, текст, категория..."
              aria-label="Търсене във фийда"
              data-feed-search
            />
          </div>
        </div>
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-tags me-1" aria-hidden="true"></i>Категория</label>
          <select class="form-select form-select-sm" data-feed-category-filter aria-label="Филтър по категория">
            <option value="">Всички категории</option>
          </select>
        </div>
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-images me-1" aria-hidden="true"></i>Снимки</label>
          <select class="form-select form-select-sm" data-feed-photo-filter aria-label="Филтър по снимки">
            <option value="">Всички</option>
            <option value="with">Със снимка</option>
            <option value="without">Без снимка</option>
          </select>
        </div>
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-funnel me-1" aria-hidden="true"></i>Подреди по</label>
          <select class="form-select form-select-sm" data-feed-sort-filter aria-label="Подреждане на публикациите">
            <option value="newest" selected>Най-нови публикации</option>
            <option value="oldest">Най-стари публикации</option>
            <option value="most_liked">Най-харесвани</option>
            <option value="most_commented">Най-коментирани</option>
          </select>
        </div>
        </div>

        <div class="collapse mt-3" id="feed-advanced-filters">
          <div class="aqua-feed-filter-grid aqua-feed-filter-grid-advanced">
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-geo-alt me-1" aria-hidden="true"></i>Локация</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-geo-alt" aria-hidden="true"></i></span>
            <input
              type="text"
              class="form-control"
              placeholder="Напр. София"
              list="feed-location-suggestions"
              aria-label="Филтър по локация"
              data-feed-location-filter
            />
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-feed-use-my-location
              aria-label="Използвай моята позиция"
              title="Използвай моята позиция"
              data-bs-toggle="tooltip"
              data-bs-placement="top"
            >
              <i class="bi bi-crosshair" aria-hidden="true"></i>
            </button>
          </div>
          <datalist id="feed-location-suggestions" data-feed-location-list></datalist>
        </div>
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-person me-1" aria-hidden="true"></i>Потребител</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-person" aria-hidden="true"></i></span>
            <input
              type="text"
              class="form-control"
              placeholder="@username или име"
              list="feed-author-suggestions"
              aria-label="Филтър по потребител"
              data-feed-author-filter
            />
          </div>
          <datalist id="feed-author-suggestions" data-feed-author-list></datalist>
        </div>
        <div class="aqua-feed-filter-field">
          <label class="form-label form-label-sm mb-1"><i class="bi bi-crosshair me-1" aria-hidden="true"></i>Близо до мен</label>
          <div class="d-flex align-items-center gap-2">
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" role="switch" id="feed-nearby-switch" data-feed-nearby-toggle />
              <label class="form-check-label small" for="feed-nearby-switch">Активирай</label>
            </div>
            <select class="form-select form-select-sm" data-feed-radius-filter aria-label="Радиус за близо до мен" style="max-width: 120px;">
              <option value="5">5 км</option>
              <option value="10">10 км</option>
              <option value="25" selected>25 км</option>
              <option value="50">50 км</option>
              <option value="100">100 км</option>
            </select>
          </div>
        </div>
          </div>
        </div>

        <div class="aqua-feed-active-filters d-none mt-3" data-feed-active-filters></div>

        <div class="small text-secondary mt-2 mb-0 d-none aqua-feed-filter-status" data-feed-filter-status></div>
      </div>

      <div data-feed-notifications></div>

      <div class="alert alert-danger d-none" role="alert" data-feed-error></div>

      <div class="text-secondary mb-3" data-feed-loading>Зареждане на публикации...</div>

      <div class="row g-3" data-feed-list></div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
