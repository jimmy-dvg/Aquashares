<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquashares - Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/index.html">Aquashares</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav align-items-lg-center gap-lg-1 mb-2 mb-lg-0 aqua-nav-pages">
            <li class="nav-item"><a class="nav-link" href="/index.html">Feed</a></li>
            <li class="nav-item dropdown aqua-nav-categories" data-nav-categories>
              <button
                type="button"
                class="nav-link btn btn-link dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                data-nav-categories-toggle
              >
                Categories
              </button>
              <ul class="dropdown-menu" data-nav-categories-menu>
                <li><a class="dropdown-item" href="/index.html">All Categories</a></li>
              </ul>
            </li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/post-create.html">Create Post</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/chat.html">Chat</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/profile.html">Profile</a></li>
            <li class="nav-item d-none" data-nav-admin><a class="nav-link" href="/admin.html">Admin</a></li>
          </ul>

          <form class="aqua-nav-search my-2 my-lg-0 mx-lg-3" role="search" data-nav-search-form>
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-search" aria-hidden="true"></i></span>
              <input type="search" class="form-control" name="q" placeholder="Search posts..." aria-label="Search posts" data-nav-search-input />
            </div>
          </form>

          <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 ms-lg-auto aqua-nav-account">
            <div class="d-flex align-items-center gap-2 d-none" data-nav-auth>
              <div class="dropdown" data-notifications-dropdown>
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm position-relative aqua-nav-icon-btn"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  aria-label="Notifications"
                >
                  <i class="bi bi-bell-fill" aria-hidden="true"></i>
                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" data-notifications-badge>0</span>
                </button>
                <div class="dropdown-menu dropdown-menu-end p-0 aqua-notifications-menu">
                  <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                    <strong class="small">Notifications</strong>
                    <button type="button" class="btn btn-link btn-sm p-0" data-notifications-mark-all>Mark all read</button>
                  </div>
                  <div class="list-group list-group-flush" data-notifications-list></div>
                  <div class="px-3 py-2 text-secondary small" data-notifications-empty>No notifications yet.</div>
                </div>
              </div>

              <div class="dropdown">
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm dropdown-toggle aqua-nav-user-trigger"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  data-nav-user-button
                >
                  <i class="bi bi-person-circle" aria-hidden="true"></i>
                  <span data-nav-status>User</span>
                  <span class="badge text-bg-warning d-none" data-nav-user-role>Admin</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" href="/profile.html">Profile</a></li>
                  <li class="d-none" data-nav-admin><a class="dropdown-item" href="/admin.html">Admin Panel</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li><button type="button" class="dropdown-item text-danger" data-nav-logout>Logout</button></li>
                </ul>
              </div>
            </div>

            <div class="d-flex align-items-center gap-2" data-nav-guest>
              <a class="btn btn-outline-secondary btn-sm" href="/login.html">Login</a>
              <a class="btn btn-primary btn-sm" href="/register.html">Register</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container page-content">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card">
            <div class="card-body">
              <h1 class="h4 mb-3">Register</h1>

              <div class="alert alert-success d-none" role="alert" data-register-success></div>
              <div class="alert alert-danger d-none" role="alert" data-register-error></div>

              <form data-register-form novalidate>
                <div class="mb-3">
                  <label for="register-username" class="form-label">Username</label>
                  <input
                    id="register-username"
                    type="text"
                    class="form-control"
                    minlength="3"
                    maxlength="30"
                    required
                    data-register-username
                  />
                </div>

                <div class="mb-3">
                  <label for="register-email" class="form-label">Email</label>
                  <input id="register-email" type="email" class="form-control" autocomplete="email" required data-register-email />
                </div>

                <div class="mb-3">
                  <label for="register-password" class="form-label">Password</label>
                  <input
                    id="register-password"
                    type="password"
                    class="form-control"
                    minlength="6"
                    autocomplete="new-password"
                    required
                    data-register-password
                  />
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary" data-register-submit>Register</button>
                  <a href="/login.html" class="btn btn-outline-secondary">Already have an account</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
