<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquashares - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/index.html">Aquashares</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/index.html">Feed</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/post-create.html">Create Post</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/chat.html">Chat</a></li>
            <li class="nav-item d-none" data-nav-auth><a class="nav-link" href="/profile.html">Profile</a></li>
            <li class="nav-item d-none" data-nav-admin><a class="nav-link" href="/admin.html">Admin</a></li>
            <li class="nav-item" data-nav-guest><a class="nav-link" href="/login.html">Login</a></li>
            <li class="nav-item" data-nav-guest><a class="nav-link" href="/register.html">Register</a></li>
            <li class="nav-item dropdown d-none" data-nav-auth data-notifications-dropdown>
              <button
                type="button"
                class="btn btn-link nav-link p-0 position-relative"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-label="Notifications"
              >
                <i class="bi bi-bell-fill" aria-hidden="true"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" data-notifications-badge>0</span>
              </button>
              <div class="dropdown-menu dropdown-menu-end p-0 aqua-notifications-menu">
                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                  <strong class="small">Notifications</strong>
                  <button type="button" class="btn btn-link btn-sm p-0" data-notifications-mark-all>Mark all read</button>
                </div>
                <div class="list-group list-group-flush" data-notifications-list></div>
                <div class="px-3 py-2 text-secondary small" data-notifications-empty>No notifications yet.</div>
              </div>
            </li>
            <li class="nav-item d-none" data-nav-auth><span class="nav-link" data-nav-status></span></li>
            <li class="nav-item d-none" data-nav-auth><button type="button" class="btn btn-link nav-link p-0" data-nav-logout>Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-content">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card">
            <div class="card-body">
              <h1 class="h4 mb-3">Login</h1>

              <div class="alert alert-danger d-none" role="alert" data-login-error></div>

              <form data-login-form novalidate>
                <div class="mb-3">
                  <label for="login-email" class="form-label">Email</label>
                  <input id="login-email" type="email" class="form-control" autocomplete="email" required data-login-email />
                </div>

                <div class="mb-3">
                  <label for="login-password" class="form-label">Password</label>
                  <input
                    id="login-password"
                    type="password"
                    class="form-control"
                    autocomplete="current-password"
                    required
                    minlength="6"
                    data-login-password
                  />
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary" data-login-submit>Login</button>
                  <a href="/register.html" class="btn btn-outline-secondary">Create account</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
